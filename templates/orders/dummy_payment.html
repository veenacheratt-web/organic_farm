<!-- templates/orders/dummy_payment.html -->

{% extends 'base.html' %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header bg-success text-white">
                    <h4 class="mb-0">Payment Gateway (Demo)</h4>
                </div>
                <div class="card-body">
                    <div class="alert alert-info">
                        <i class="fas fa-info-circle"></i> This is a dummy payment page for testing purposes.
                    </div>
                    
                    <p><strong>Order #:</strong> {{ order.order_number }}</p>
                    <p><strong>Amount:</strong> ${{ order.total_amount|floatformat:2 }}</p>
                    
                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="form-label">Card Number</label>
                            <input type="text" name="card_number" class="form-control" placeholder="4242 4242 4242 4242" required>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Expiry Date</label>
                                <input type="text" name="expiry" class="form-control" placeholder="MM/YY" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">CVV</label>
                                <input type="text" name="cvv" class="form-control" placeholder="123" required>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-success w-100">
                            <i class="fas fa-lock"></i> Pay ${{ order.total_amount|floatformat:2 }}
                        </button>
                    </form>
                    
                    <hr>
                    <p class="text-muted small text-center mb-0">
                        <i class="fas fa-shield-alt"></i> Test Card: Any 16-digit number with 3-digit CVV works
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
